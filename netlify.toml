[build]
  command = "npm run build -w apps/web"
  publish = "apps/web/.next"

[dev]
  command = "npm run dev -w apps/web"
  framework = "next"
  targetPort = 3000

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "apps/web/netlify/functions"
  # Cargar variables de entorno para funciones en desarrollo
  [functions.environment]
    # Las variables sensibles se cargan desde .env.local automáticamente
    # pero las funciones background a veces no las leen correctamente

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

